  <!-- Main Body -->
  <path d="M848.391 281.093L950 267.881C942.809 302.146 858.883 346.083 828.156 361.728C827.102 362.267 826.049 362.78 824.976 363.267C800.568 374.552 775.816 384.272 750.841 392.479C684.708 414.177 591.795 408 524 408C371.577 384.266 323.133 303.956 97 248.905C509.742 105.306 521 70.9999 750.882 105.306C775.836 113.487 800.588 123.207 824.996 134.492C862.225 151.727 945.584 212.695 950 254.115C950 254.115 861.948 260.286 848.391 281.093Z" fill="url(#paint0_linear_9_72)"/>
