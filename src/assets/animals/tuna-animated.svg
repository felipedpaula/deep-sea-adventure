<svg width="1050" height="532" viewBox="-50 -30 1050 532" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  .tuna-body {
    transform-origin: 780px 250px;
    animation: body-swim 0.6s ease-in-out infinite;
  }
  .tail-fin {
    transform-origin: 158.7px 249px;
    animation: tail-swim 0.6s ease-in-out infinite;
  }
  .fin-pectoral-top {
    transform-origin: 461px 120px;
    animation: pectoral-top-swim 0.6s ease-in-out infinite;
  }
  .fin-pectoral-bottom {
    transform-origin: 471px 380px;
    animation: pectoral-bottom-swim 0.6s ease-in-out infinite;
  }

  @keyframes body-swim {
    0%, 100% {
      transform: rotate(-1.2deg);
    }
    50% {
      transform: rotate(1.2deg);
    }
  }

  @keyframes tail-swim {
    0%, 100% {
      transform: rotate(0deg);
    }
    25% {
      transform: rotate(-8deg);
    }
    50% {
      transform: rotate(0deg);
    }
    75% {
      transform: rotate(8deg);
    }
  }

  @keyframes pectoral-top-swim {
    0%, 100% {
      transform: rotate(0.8deg);
    }
    50% {
      transform: rotate(-0.8deg);
    }
  }

  @keyframes pectoral-bottom-swim {
    0%, 100% {
      transform: rotate(-0.8deg);
    }
    50% {
      transform: rotate(0.8deg);
    }
  }
</style>
<g class="tuna-body">
