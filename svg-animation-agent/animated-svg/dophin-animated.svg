<svg width="880" height="442" viewBox="-40 -20 880 442" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  .whole-dolphin {
    animation: swim-whole 4.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }
  
  .body-skew {
    transform-origin: 450px 250px;
    animation: swim-body-skew 4.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    animation-delay: -0.45s;
  }
  
  .pec-group {
    transform-origin: 485px 258px;
    animation: swim-pec 4.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }
  
  .tail-group {
    transform-origin: 165px 238px;
    animation: swim-tail 4.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    animation-delay: -1.125s;
  }

  @keyframes swim-whole {
    0% {
      transform: translateY(8px) rotate(1.5deg);
    }
    50% {
      transform: translateY(-8px) rotate(-1.5deg);
    }
    100% {
      transform: translateY(8px) rotate(1.5deg);
    }
  }

  @keyframes swim-body-skew {
    0% {
      transform: skewX(-1.5deg);
    }
    50% {
      transform: skewX(1.5deg);
    }
    100% {
      transform: skewX(-1.5deg);
    }
  }

  @keyframes swim-pec {
    0% {
      transform: rotate(0deg);
    }
    25% {
      transform: rotate(-6deg);
    }
    50% {
      transform: rotate(0deg);
    }
    75% {
      transform: rotate(6deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }

  @keyframes swim-tail {
    0% {
      transform: rotate(-10deg);
    }
    50% {
      transform: rotate(10deg);
    }
    100% {
      transform: rotate(-10deg);
    }
  }
</style>
<g class="whole-dolphin">
